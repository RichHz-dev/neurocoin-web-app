services:
  backend:
    build: ./backend
    container_name: neurocoin_backend
    restart: always
    ports:
      - "5000:5000"   
    env_file:
      - ./backend/.env 

  frontend:
    build: ./Frontend
    container_name: neurocoin_frontend
    restart: always
    ports:
      - "80:80" 
    depends_on:
      - backend

