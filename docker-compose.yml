services:
  backend:
    build: ./backend
    container_name: neurocoin_backend
    restart: always
    ports:
      - "5000:5000"   
    environment:
      - AI_SERVICE_URL=http://ai-service:8000
    env_file:
      - ./backend/.env 
    networks:
      - neurocoin_network

  frontend:
    build: ./Frontend
    container_name: neurocoin_frontend
    restart: always
    ports:
      - "80:80" 
    depends_on:
      - backend
    networks:
      - neurocoin_network

networks:
  neurocoin_network:
    external: true

