services:
  backend:
    build: ./backend
    container_name: neurocoin_backend
    restart: always
    ports:
      - "5000:5000" # Ajusta el puerto izquierdo si quieres acceder por otro en tu máquina
    env_file:
      - ./backend/.env # Esto inyectará tus variables de entorno (como GEMINI_API_KEY) al contenedor

  frontend:
    build: ./Frontend
    container_name: neurocoin_frontend
    restart: always
    ports:
      - "80:80" # Ahora tu frontend vivirá en http://localhost
    depends_on:
      - backend