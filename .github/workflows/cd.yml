name: Despliegue Continuo (CD) en AWS

on:
  push:
    branches: [ main ] # El robot solo se activará cuando los cambios se unan a la rama principal

jobs:
  deploy:
    name: Desplegar en Servidor EC2
    runs-on: ubuntu-latest

    steps:
    # 1. Clonar el código más reciente en la máquina del robot
    - name: Clonar Repositorio
      uses: actions/checkout@v4

    # 2. Copiar los archivos directamente al servidor de AWS (Evita usar Git dentro de AWS)
    - name: Enviar archivos a AWS mediante SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "."
        target: "neurocoin-web-app"

    # 3. Conectarse por SSH solo para ordenar a Docker que se encienda
    - name: Levantar Contenedores en la Nube
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # 1. Crear la red compartida de Docker si no existe
          docker network create neurocoin_network 2>/dev/null || true
          
          # 2. Entrar a la carpeta donde el robot acaba de dejar los archivos
          cd neurocoin-web-app
          
          # 3. Reconstruir y encender los contenedores actualizados
          docker compose up -d --build